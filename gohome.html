<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찬솔이의 집으로!</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen">

    <div class="text-center p-8 bg-white rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold text-blue-600 mb-4">찬솔님, 곧 퇴근입니다!</h1>
        <p class="text-gray-600">지금 바로 팝업이 시작됩니다...</p>
    </div>

    <script>
        window.onload = () => {
            // 브라우저 정책상 팝업을 한 번에 여러 개 띄우면 바로 차단됩니다.
            // 최대한 '뽝!' 하고 뜰 수 있도록 간격을 아주 짧게 설정했습니다.
            for (let i = 1; i <= 100; i++) {
                // 간격을 50ms로 설정하여 거의 동시에 뜨도록 유도합니다.
                setTimeout(() => {
                    alert(`${i}번째: 찬솔이 집에언제가나~`);
                }, i * 50); 
            }
        };
    </script>
</body>
</html>
