<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>김현식과 아이들</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0;
      padding: 0;
      /* 고급스러운 다크 그라데이션 배경 */
      background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
      background-size: 200% 200%;
      animation: gradientBG 15s ease infinite;
      color: #f8fafc;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .font-poppins {
      font-family: 'Poppins', sans-serif;
    }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    /* 다크 테마 글래스모피즘 */
    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    /* 납부 상태 애니메이션 펄스 */
    .status-pulse-green {
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
      animation: pulseGreen 2s infinite;
    }
    @keyframes pulseGreen {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    .status-pulse-red {
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      animation: pulseRed 2s infinite;
    }
    @keyframes pulseRed {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body class="flex justify-center items-start pt-6 pb-12 px-4 sm:px-6">

  <div class="w-full max-w-lg relative flex flex-col gap-6">
    
    <!-- 배경 장식용 빛번짐 효과 -->
    <div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-indigo-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-80 h-80 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- 헤더 / 총 모임 금액 -->
    <header class="glass-panel rounded-3xl p-6 text-center relative overflow-hidden z-10">
      <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-amber-200/10 to-transparent rounded-bl-full"></div>
      
      <div class="flex justify-center mb-3">
        <span class="bg-white/10 text-xs font-bold px-3 py-1 rounded-full text-white/80 tracking-wider">
          <i class="fa-solid fa-calendar-check mr-1"></i> 매월 23일 입금일
        </span>
      </div>
      <h1 class="text-xl sm:text-2xl font-bold text-white mb-1 leading-snug">
        MWJ<br>에겐남들 모임
      </h1>
      <p class="text-sm text-slate-400 mb-6">우리가 모인 금액 (카카오뱅크)</p>
      
      <div class="flex justify-center items-baseline gap-1">
        <span class="font-poppins text-4xl sm:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500" id="total-amount">
          0
        </span>
        <span class="text-xl text-yellow-500 font-bold">원</span>
      </div>
      <div class="mt-4 flex justify-center gap-4 text-xs text-slate-300">
        <div class="flex items-center gap-1"><i class="fa-solid fa-users text-indigo-400"></i> 총 <span id="total-members-count" class="font-bold text-white">0</span>명</div>
        <div class="flex items-center gap-1"><i class="fa-solid fa-money-bill-wave text-green-400"></i> 월 2만원</div>
      </div>
    </header>

    <!-- 이번달 입금 현황 -->
    <section class="glass-panel rounded-3xl p-5 sm:p-6 z-10">
      <div class="flex justify-between items-end mb-5">
        <div>
          <h2 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fa-solid fa-circle-check text-green-400"></i> 이번달 입금 현황
          </h2>
          <p class="text-xs text-slate-400 mt-1" id="current-month-text">2026년 7월 기준</p>
        </div>
        <div class="text-xs font-medium text-slate-300 bg-white/5 px-2 py-1 rounded-lg border border-white/10">
          완료 <span id="paid-count" class="text-green-400 font-bold">0</span>/<span id="total-paid-target" class="font-bold">0</span>
        </div>
      </div>

      <!-- 멤버 리스트 그리드 -->
      <div id="members-grid" class="grid grid-cols-3 sm:grid-cols-4 gap-3 sm:gap-4">
        <div class="flex flex-col items-center gap-2">
          <div class="relative w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-slate-700 animate-pulse"></div>
          <div class="h-3 w-10 bg-slate-700 rounded animate-pulse"></div>
        </div>
      </div>
    </section>

    <!-- 계절별 정기 모임 계획 -->
    <section class="glass-panel rounded-3xl p-5 sm:p-6 z-10">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i class="fa-solid fa-map-location-dot text-indigo-400"></i> 연간 정기 모임 계획
        </h2>
      </div>

      <div id="schedules-container" class="space-y-3">
        <div class="glass-card rounded-2xl p-4 h-24 animate-pulse bg-slate-700/20 border-white/5"></div>
        <div class="glass-card rounded-2xl p-4 h-24 animate-pulse bg-slate-700/20 border-white/5"></div>
      </div>
    </section>

    <!-- 주요 경조사 및 일정 -->
    <section class="glass-panel rounded-3xl p-5 sm:p-6 z-10">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i class="fa-solid fa-cake-candles text-pink-400"></i> 주요 경조사 및 일정
        </h2>
      </div>

      <div id="events-container" class="space-y-3">
        <div class="glass-card rounded-2xl p-4 h-16 animate-pulse bg-slate-700/20 border-white/5"></div>
        <div class="glass-card rounded-2xl p-4 h-16 animate-pulse bg-slate-700/20 border-white/5"></div>
      </div>
    </section>
    
    <footer class="text-center py-4 text-xs text-slate-500 pb-10">
      &copy; 2026 MWJ 에겐남들 모임. All rights reserved.
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnjCWfcbvrvadmQ3bjoRJTD-rXSKzp_Bo",
      authDomain: "git-io-33713.firebaseapp.com",
      projectId: "git-io-33713",
      storageBucket: "git-io-33713.firebasestorage.app",
      messagingSenderId: "488733080531",
      appId: "1:488733080531:web:2a95f7c25856b078ce8d26",
      measurementId: "G-58XJP9R6HB"
    };

    const mockMembers = [
      { name: "김관모", isPaid: false, photoUrl: "" },
      { name: "김현식", isPaid: true, photoUrl: "" },
      { name: "박성현", isPaid: false, photoUrl: "" },
      { name: "엄찬솔", isPaid: true, photoUrl: "" },
      { name: "이지원", isPaid: false, photoUrl: "" },
      { name: "지원복", isPaid: true, photoUrl: "" },
      { name: "지호진", isPaid: false, photoUrl: "" },
      { name: "최진우", isPaid: true, photoUrl: "" }
    ];

    const mockSchedules = [
      { id: "spring", season: "봄 (3~5월)", order: 1, title: "주제 미정", date: "일정 미정", location: "장소 미정", link: "", status: "예정", icon: "fa-seedling", color: "pink" },
      { id: "summer", season: "여름 (6~8월)", order: 2, title: "주제 미정", date: "일정 미정", location: "장소 미정", link: "", status: "예정", icon: "fa-water", color: "blue" },
      { id: "fall", season: "가을 (9~11월)", order: 3, title: "주제 미정", date: "일정 미정", location: "장소 미정", link: "", status: "예정", icon: "fa-leaf", color: "orange" },
      { id: "winter", season: "겨울 (12~2월)", order: 4, title: "주제 미정", date: "일정 미정", location: "장소 미정", link: "", status: "예정", icon: "fa-snowflake", color: "slate" }
    ];

    const mockEvents = [
      { id: "e1", title: "최진우 생일파티", date: "2026-08-15", type: "birthday", location: "홍대 루프탑", link: "https://map.naver.com" },
      { id: "e2", title: "김관모 결혼식", date: "2026-10-24", type: "wedding", location: "강남 웨딩홀", link: "https://map.naver.com" }
    ];

    let currentTotalAmount = 0;
    let app, db;

    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch (e) {
      console.error("Firebase 초기화 에러:", e);
    }

    const today = new Date();
    document.getElementById('current-month-text').innerText = `${today.getFullYear()}년 ${today.getMonth() + 1}월 기준`;

    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function renderMembers(membersData) {
      const grid = document.getElementById('members-grid');
      grid.innerHTML = ''; 
      
      let paidCount = 0;
      const totalMembers = membersData.length;

      document.getElementById('total-members-count').innerText = totalMembers;
      document.getElementById('total-paid-target').innerText = totalMembers;

      membersData.forEach(member => {
        if(member.isPaid) paidCount++;
        const imgSrc = member.photoUrl && member.photoUrl.trim() !== '' 
            ? member.photoUrl 
            : `https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&background=random&color=fff`;

        const statusClass = member.isPaid ? 'border-green-500 status-pulse-green' : 'border-red-500/50 opacity-60 grayscale';
        const badgeHTML = member.isPaid
            ? `<div class="absolute -bottom-1 -right-1 bg-green-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1e293b] z-10"><i class="fa-solid fa-check"></i></div>`
            : `<div class="absolute -bottom-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1e293b] z-10"><i class="fa-solid fa-xmark"></i></div>`;
        const nameClass = member.isPaid ? 'text-white' : 'text-slate-400 line-through decoration-red-500/50';

        const card = document.createElement('div');
        card.className = 'flex flex-col items-center gap-2 group';
        card.innerHTML = `
          <div class="relative">
            <img src="${imgSrc}" alt="${member.name}" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full object-cover border-2 ${statusClass} transition-transform group-hover:scale-105">
            ${badgeHTML}
          </div>
          <span class="text-xs sm:text-sm font-bold ${nameClass}">${member.name}</span>
        `;
        grid.appendChild(card);
      });
      document.getElementById('paid-count').innerText = paidCount;
    }

    // 일정 카드 전체 클릭 기능 적용 (링크가 존재할 경우)
    function renderSchedules(schedulesData) {
      const container = document.getElementById('schedules-container');
      container.innerHTML = '';

      schedulesData.sort((a, b) => a.order - b.order);

      schedulesData.forEach(s => {
        let bgClass, iconClass, badgeClass;
        if(s.color === 'pink') { bgClass = 'bg-pink-500/20 border-pink-500/30'; iconClass = 'text-pink-400'; badgeClass = 'bg-slate-700/50 text-slate-300 border-white/5'; }
        else if(s.color === 'blue') { bgClass = 'bg-blue-500/20 border-blue-500/30'; iconClass = 'text-blue-400'; badgeClass = 'bg-slate-700/50 text-slate-300 border-white/5'; }
        else if(s.color === 'orange') { bgClass = 'bg-orange-500/20 border-orange-500/30'; iconClass = 'text-orange-400'; badgeClass = 'bg-slate-700/50 text-slate-300 border-white/5'; }
        else { bgClass = 'bg-slate-200/20 border-slate-200/30'; iconClass = 'text-slate-200'; badgeClass = 'bg-slate-700/50 text-slate-300 border-white/5'; }

        if(s.status === '진행중') badgeClass = 'bg-indigo-500 text-white shadow-lg shadow-indigo-500/30 animate-pulse';
        if(s.status === '종료') badgeClass = 'bg-slate-800 text-slate-500 border-white/5';

        const hasLink = s.link && s.link.trim() !== '';
        const locationHtml = `<i class="fa-solid fa-location-dot mr-1"></i> ${s.location}`;

        const cardContent = `
          <div class="w-12 h-12 rounded-xl flex justify-center items-center flex-shrink-0 border relative z-10 ${bgClass}">
            <i class="fa-solid ${s.icon} ${iconClass} text-xl"></i>
          </div>
          <div class="flex-grow relative z-10">
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-white text-sm sm:text-base">${s.season}</h3>
              <span class="text-[10px] px-2 py-0.5 rounded border ${badgeClass}">${s.status}</span>
            </div>
            <p class="text-sm text-white font-bold mt-1">${s.title}</p>
            <p class="text-xs text-slate-400 mt-1"><i class="fa-regular fa-clock mr-1"></i> ${s.date}</p>
            <p class="text-xs ${hasLink ? 'text-indigo-300 underline decoration-indigo-400/50' : 'text-slate-300'} mt-0.5">${locationHtml}</p>
          </div>
        `;

        let card;
        if (hasLink) {
          card = document.createElement('a');
          card.href = s.link;
          card.target = "_blank";
          card.className = 'glass-card rounded-2xl p-4 flex gap-4 items-center relative overflow-hidden block cursor-pointer hover:border-indigo-400/50';
        } else {
          card = document.createElement('div');
          card.className = 'glass-card rounded-2xl p-4 flex gap-4 items-center relative overflow-hidden';
        }
        
        if(s.status === '진행중') card.classList.add('border-indigo-500/30', 'bg-indigo-500/10');
        card.innerHTML = cardContent;
        container.appendChild(card);
      });
    }

    function calculateDday(targetDate) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const tDate = new Date(targetDate);
      tDate.setHours(0,0,0,0);
      const diffTime = tDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      if (diffDays > 0) return `D-${diffDays}`;
      if (diffDays === 0) return `D-Day`;
      return `D+${Math.abs(diffDays)}`;
    }

    // 주요 일정 카드 전체 클릭 기능 적용 (링크가 존재할 경우)
    function renderEvents(eventsData) {
      const container = document.getElementById('events-container');
      container.innerHTML = '';
      
      const today = new Date();
      today.setHours(0,0,0,0);

      const upcomingEvents = eventsData.filter(ev => {
        const tDate = new Date(ev.date);
        tDate.setHours(0,0,0,0);
        return tDate >= today;
      });

      upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
      const topEvents = upcomingEvents.slice(0, 5);

      if (topEvents.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 text-sm py-4">다가오는 일정이 없습니다.</div>';
        return;
      }

      topEvents.forEach(ev => {
        let iconClass, iconColor;
        if(ev.type === 'birthday') { iconClass = 'fa-cake-candles'; iconColor = 'text-pink-400'; }
        else if(ev.type === 'wedding') { iconClass = 'fa-ring'; iconColor = 'text-yellow-400'; }
        else if(ev.type === 'housewarming') { iconClass = 'fa-house-chimney'; iconColor = 'text-emerald-400'; }
        else { iconClass = 'fa-calendar-check'; iconColor = 'text-indigo-400'; }

        const dDayStr = calculateDday(ev.date);
        const isClose = dDayStr === 'D-Day' || (dDayStr.startsWith('D-') && parseInt(dDayStr.replace('D-', '')) <= 7);
        const dDayClass = isClose ? 'bg-red-500 text-white animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]' : 'bg-slate-700/50 text-slate-300 border border-white/5';

        const hasLink = ev.link && ev.link.trim() !== '';
        const locationHtml = ev.location ? `<span><i class="fa-solid fa-location-dot mr-1 w-3 text-center"></i> ${ev.location}</span>` : '';

        const cardContent = `
          <div class="w-12 h-12 rounded-xl flex justify-center items-center flex-shrink-0 bg-white/5 border border-white/10">
            <i class="fa-solid ${iconClass} ${iconColor} text-xl"></i>
          </div>
          <div class="flex-grow">
            <div class="flex justify-between items-start mb-1">
              <h3 class="font-bold text-white text-sm sm:text-base">${ev.title}</h3>
              <span class="text-[10px] px-2 py-0.5 rounded font-bold ${dDayClass}">${dDayStr}</span>
            </div>
            <div class="flex flex-col gap-0.5 text-xs ${hasLink ? 'text-indigo-300' : 'text-slate-400'} mt-1">
              <span><i class="fa-regular fa-calendar mr-1 w-3 text-center"></i> ${ev.date}</span>
              ${locationHtml}
            </div>
          </div>
        `;

        let card;
        if (hasLink) {
          card = document.createElement('a');
          card.href = ev.link;
          card.target = "_blank";
          card.className = 'glass-card rounded-2xl p-4 flex gap-4 items-center transition-transform hover:scale-[1.02] block cursor-pointer hover:border-indigo-400/50';
        } else {
          card = document.createElement('div');
          card.className = 'glass-card rounded-2xl p-4 flex gap-4 items-center transition-transform hover:scale-[1.02]';
        }

        card.innerHTML = cardContent;
        container.appendChild(card);
      });
    }

    renderMembers(mockMembers);
    renderSchedules(mockSchedules);
    renderEvents(mockEvents);
    document.getElementById('total-amount').innerText = formatNumber(currentTotalAmount);

    if(db) {
      onSnapshot(doc(db, 'account_info', 'current'), (docSnap) => {
        if (docSnap.exists() && docSnap.data().totalAmount !== undefined) {
          document.getElementById('total-amount').innerText = formatNumber(docSnap.data().totalAmount);
        }
      }, console.error);

      onSnapshot(collection(db, 'members'), (snapshot) => {
        const fetchedMembers = [];
        snapshot.forEach(doc => fetchedMembers.push({ id: doc.id, ...doc.data() }));
        fetchedMembers.sort((a,b) => a.name.localeCompare(b.name));
        renderMembers(fetchedMembers);
      }, console.error);

      onSnapshot(collection(db, 'schedules'), (snapshot) => {
        if (!snapshot.empty) {
          const fetchedSchedules = [];
          snapshot.forEach(doc => fetchedSchedules.push({ id: doc.id, ...doc.data() }));
          renderSchedules(fetchedSchedules);
        }
      }, console.error);

      onSnapshot(collection(db, 'events'), (snapshot) => {
        if (!snapshot.empty) {
          const fetchedEvents = [];
          snapshot.forEach(doc => fetchedEvents.push({ id: doc.id, ...doc.data() }));
          renderEvents(fetchedEvents);
        }
      }, console.error);
    }
  </script>
</body>
</html>
